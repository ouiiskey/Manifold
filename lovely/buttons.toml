[manifest]
version = "1.0.0"
dump_lua = true
priority = 0

# Card:highlight
[[patches]]
[patches.pattern]
target = "card.lua"
pattern = "if self.ability.consumeable or self.ability.set == 'Joker' then"
position = "before"
match_indent = true
payload = '''
if G.GAME.selected_back_key then
    if G.GAME.selected_back_key.key == "b_manifold_orientable" and (self.ability.set == "Tarot" or self.ability.set == "manifold_reverse_tarot" or self.config.center_key == "c_soul" or self.config.center_key == "c_manifold_mind") then
        if self.highlighted then
            self.children.reverse_button = MANIF.reverse_button(self)
        elseif self.children.reverse_button then
            self.children.reverse_button:remove()
            self.children.reverse_button = nil
        end
    elseif G.GAME.selected_back_key.key == "b_manifold_icy" and (self.area == G.shop_jokers or self.area == G.pack_cards) then
        if self.highlighted then
            self.children.freeze_button = MANIF.freeze_button(self)
        elseif self.children.freeze_button then
            self.children.freeze_button:remove()
            self.children.freeze_button = nil
        end
    end
end
'''

# tags_buttons DrawStep
[[patches]]
[patches.pattern]
target = '=[SMODS _ "src/card_draw.lua"]'
pattern = "if self.children.use_button and self.highlighted then self.children.use_button:draw() end"
position = "after"
match_indent = true
payload = '''
if self.children.reverse_button and self.highlighted then self.children.reverse_button:draw() end
if self.children.freeze_button and self.highlighted then self.children.freeze_buttion:draw() end
'''

# Card:sell_card
[[patches]]
[patches.pattern]
target = "card.lua"
pattern = "if self.children.use_button then self.children.use_button:remove(); self.children.use_button = nil end"
position = "after"
match_indent = true
payload = '''
if self.children.reverse_button then self.children.reverse_button:remove(); self.children.reverse_button = nil end
'''

# G.FUNCS.use_card
[[patches]]
[patches.pattern]
target = "functions/button_callbacks.lua"
pattern = "if card.children.use_button then card.children.use_button:remove(); card.children.use_button = nil end"
position = "after"
match_indent = true
payload = '''
if card.children.reverse_button then card.children.reverse_button:remove(); card.children.reverse_button = nil end
if card.children.freeze_button then card.children.freeze_button:remove(); card.children.freeze_button = nil end
'''

# create_shop_card_ui
[[patches]]
[patches.pattern]
target = "functions/UI_definitions.lua"
position = "at"
match_indent = true
pattern = '''
offset = {x=-0.3,y=0},
'''
payload = '''
offset = {x = -0.3, y = (G.GAME.selected_back_key.key == "b_manifold_orientable" or G.GAME.selected_back_key.key == "b_manifold_icy") and -0.5 or 0},
'''